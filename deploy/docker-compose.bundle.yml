services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: listmonk_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-39173}:9000"
    networks:
      - listmonk
    hostname: ${APP_HOSTNAME:-lmk-7q9n.edge.example.net}
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - ./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: ${POSTGRES_USER:-lmkp_A7vN3qY8}
      LISTMONK_db__password: ${POSTGRES_PASSWORD:-Db_T9x4Qm7Lp2Rs8Vk}
      LISTMONK_db__database: ${POSTGRES_DB:-lmkd_A7vN3qY8}
      LISTMONK_db__host: db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: 300s
      TZ: ${TZ:-Etc/UTC}
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ./uploads:/listmonk/uploads:rw

  db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT_BIND:-127.0.0.1:35491}:5432"
    networks:
      - listmonk
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lmkp_A7vN3qY8}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Db_T9x4Qm7Lp2Rs8Vk}
      POSTGRES_DB: ${POSTGRES_DB:-lmkd_A7vN3qY8}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lmkp_A7vN3qY8}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: listmonk-data
        target: /var/lib/postgresql/data

networks:
  listmonk:

volumes:
  listmonk-data:
